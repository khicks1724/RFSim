<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RF SIM Waterfall (Emitters)</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
  }

  canvas {
    display: block;
  }

  .overlay {
    position: absolute;
    top: 16px;
    left: 20px;
    color: rgba(255,255,255,0.55);
    font-size: 28px;
    letter-spacing: 3px;
    font-weight: bold;
    pointer-events: none;
  }
</style>
</head>
<body>


<canvas id="waterfall"></canvas>

<script>
const canvas = document.getElementById("waterfall");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// --- PARAMETERS ---
const SCROLL_SPEED = 0.35;
const NOISE_LEVEL = 0.13;

// emitter list
let emitters = [];

function initEmitters() {
  emitters = [];
  let count = Math.floor(canvas.width / 180);

  for (let i = 0; i < count; i++) {
    emitters.push({
      x: Math.random() * canvas.width,
      width: 8 + Math.random() * 40,           // WIDER signals
      power: 0.4 + Math.random() * 0.6,        // base power
      drift: (Math.random() - 0.5) * 0.1,      // slow drift
      variationPhase: Math.random() * 1000,    // for smooth fluctuation
      variationSpeed: 0.002 + Math.random()*0.01
    });
  }
}
initEmitters();


// dim realistic color map
function getColor(v) {
  v = Math.min(1, v);

  if (v < 0.2) {
    // faded shadow purple — vary brightness with v for static texture
    let t = v / 0.2;
    return [Math.floor(8 + t * 20), Math.floor(t * 5), Math.floor(20 + t * 40)];
  }
  if (v < 0.4) return [70, 0, 110];
  if (v < 0.6) return [130, 20, 20];
  if (v < 0.8) return [170, 80, 0];
  return [220, 180, 50];
}

// smooth noise (gives "static texture")
function smoothNoise(x, t) {
  return (
    Math.sin(x * 0.05 + t) +
    Math.sin(x * 0.013 + t * 0.7) +
    Math.sin(x * 0.002 + t * 1.3)
  ) / 3;
}

// generate one row
function generateRow(time) {
  let row = new Float32Array(canvas.width);

  // base noise floor with smooth static texture in purple range
  for (let x = 0; x < row.length; x++) {
    let grain = Math.random() * NOISE_LEVEL;
    let smooth = (smoothNoise(x, time) * 0.5 + 0.5) * 0.06;
    row[x] = grain + smooth;
  }

  // emitters (wide, stable, textured)
  emitters.forEach(e => {
    e.x += e.drift;
    if (e.x < 0) e.x = canvas.width;
    if (e.x > canvas.width) e.x = 0;

    // smooth power variation over time
    e.variationPhase += e.variationSpeed;
    let powerMod = (Math.sin(e.variationPhase) * 0.5 + 0.5);

    let center = Math.floor(e.x);
    let half = Math.floor(e.width / 2);

    for (let i = -half; i <= half; i++) {
      let idx = center + i;
      if (idx >= 0 && idx < row.length) {

        // gaussian-ish shape across bandwidth
        let shape = Math.exp(-(i*i)/(2*(half*0.6)**2));

        // internal "static" texture
        let texture = smoothNoise(idx, time) * 0.15;

        // final power
        let val = e.power * (0.6 + 0.4 * powerMod) * shape;

        row[idx] += val + texture;
      }
    }
  });

  // occasional wideband burst (like interference)
  if (Math.random() < 0.01) {
    let start = Math.floor(Math.random() * canvas.width);
    let width = 40 + Math.random() * 120;

    for (let i = 0; i < width; i++) {
      let idx = start + i;
      if (idx < row.length) {
        row[idx] += 0.3 + Math.random() * 0.4;
      }
    }
  }

  return row;
}

// scroll control
let scrollAccumulator = 0;
let time = 0;

// pre-fill entire canvas with generated rows so it starts full
function prefillCanvas() {
  for (let y = canvas.height - 1; y >= 0; y--) {
    time += 0.02;
    let row = generateRow(time);
    let img = ctx.createImageData(canvas.width, 1);
    for (let x = 0; x < canvas.width; x++) {
      let [r,g,b] = getColor(row[x]);
      let i = x * 4;
      img.data[i] = r;
      img.data[i+1] = g;
      img.data[i+2] = b;
      img.data[i+3] = 255;
    }
    ctx.putImageData(img, 0, y);
  }
}
prefillCanvas();

function draw() {
  scrollAccumulator += SCROLL_SPEED;
  time += 0.02;

  if (scrollAccumulator >= 1) {
    let steps = Math.floor(scrollAccumulator);
    scrollAccumulator -= steps;

    for (let s = 0; s < steps; s++) {
      let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      ctx.putImageData(imageData, 0, 1);

      let row = generateRow(time);
      let img = ctx.createImageData(canvas.width, 1);

      for (let x = 0; x < canvas.width; x++) {
        let [r,g,b] = getColor(row[x]);

        let i = x * 4;
        img.data[i] = r;
        img.data[i+1] = g;
        img.data[i+2] = b;
        img.data[i+3] = 255;
      }

      ctx.putImageData(img, 0, 0);
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
