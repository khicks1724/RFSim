<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RF SIM Waterfall (Emitters)</title>
<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
  }

  canvas {
    display: block;
  }

  .overlay {
    position: absolute;
    top: 16px;
    left: 20px;
    color: rgba(255,255,255,0.55);
    font-size: 28px;
    letter-spacing: 3px;
    font-weight: bold;
    pointer-events: none;
  }
</style>
</head>
<body>


<canvas id="waterfall"></canvas>

<script>
const canvas = document.getElementById("waterfall");
const ctx = canvas.getContext("2d", { alpha: false, desynchronized: true });

const ROW_TIME_STEP = 0.02;
const MAX_INTERNAL_WIDTH = 960;
const MAX_INTERNAL_HEIGHT = 540;
let width = 0;
let height = 0;
let rowImageData = null;
let rafId = null;
let lastFrameTime = 0;
const scrollBuffer = document.createElement("canvas");
const scrollCtx = scrollBuffer.getContext("2d", { alpha: false, desynchronized: true });

// --- PARAMETERS ---
const SCROLL_SPEED = 0.35;
const NOISE_LEVEL = 0.22;

// emitter list
let emitters = [];

function getRenderScale() {
  const widthScale = Math.min(1, MAX_INTERNAL_WIDTH / Math.max(window.innerWidth, 1));
  const heightScale = Math.min(1, MAX_INTERNAL_HEIGHT / Math.max(window.innerHeight, 1));
  return Math.min(widthScale, heightScale);
}

function resize() {
  const scale = getRenderScale();
  width = Math.max(320, Math.round(window.innerWidth * scale));
  height = Math.max(180, Math.round(window.innerHeight * scale));
  canvas.width = width;
  canvas.height = height;
  canvas.style.width = window.innerWidth + "px";
  canvas.style.height = window.innerHeight + "px";
  rowImageData = ctx.createImageData(width, 1);
  scrollBuffer.width = width;
  scrollBuffer.height = height;
  scrollAccumulator = 0;
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, width, height);
  initEmitters();
  prefillCanvas();
}

function initEmitters() {
  emitters = [];
  let count = Math.max(4, Math.floor(width / 105));

  for (let i = 0; i < count; i++) {
    emitters.push({
      x: Math.random() * width,
      width: 8 + Math.random() * 40,           // WIDER signals
      power: 0.4 + Math.random() * 0.6,        // base power
      drift: (Math.random() - 0.5) * 0.1,      // slow drift
      variationPhase: Math.random() * 1000,    // for smooth fluctuation
      variationSpeed: 0.002 + Math.random()*0.01
    });
  }
}

// dim realistic color map
function getColor(v) {
  v = Math.min(1, v);

  if (v < 0.2) {
    // faded shadow purple — vary brightness with v for static texture
    let t = v / 0.2;
    return [Math.floor(8 + t * 20), Math.floor(t * 5), Math.floor(20 + t * 40)];
  }
  if (v < 0.4) return [70, 0, 110];
  if (v < 0.6) return [130, 20, 20];
  if (v < 0.8) return [170, 80, 0];
  return [220, 180, 50];
}

// smooth noise (gives "static texture")
function smoothNoise(x, t) {
  return (
    Math.sin(x * 0.05 + t) +
    Math.sin(x * 0.013 + t * 0.7) +
    Math.sin(x * 0.002 + t * 1.3)
  ) / 3;
}

// generate one row
function generateRow(time) {
  let row = new Float32Array(width);

  // base noise floor with smooth static texture in purple range
  for (let x = 0; x < row.length; x++) {
    let grain = Math.random() * NOISE_LEVEL;
    let smooth = (smoothNoise(x, time) * 0.5 + 0.5) * 0.12;
    row[x] = grain + smooth;
  }

  // emitters (wide, stable, textured)
  emitters.forEach(e => {
    e.x += e.drift;
    if (e.x < 0) e.x = width;
    if (e.x > width) e.x = 0;

    // smooth power variation over time
    e.variationPhase += e.variationSpeed;
    let powerMod = (Math.sin(e.variationPhase) * 0.5 + 0.5);

    let center = Math.floor(e.x);
    let half = Math.floor(e.width / 2);

    for (let i = -half; i <= half; i++) {
      let idx = center + i;
      if (idx >= 0 && idx < row.length) {

        // gaussian-ish shape across bandwidth
        let shape = Math.exp(-(i*i)/(2*(half*0.6)**2));

        // internal "static" texture
        let texture = smoothNoise(idx, time) * 0.15;

        // final power
        let val = e.power * (0.6 + 0.4 * powerMod) * shape;

        row[idx] += val + texture;
      }
    }
  });

  // occasional wideband burst (like interference)
  if (Math.random() < 0.025) {
    let start = Math.floor(Math.random() * width);
    let width = 40 + Math.random() * 120;

    for (let i = 0; i < width; i++) {
      let idx = start + i;
      if (idx < row.length) {
        row[idx] += 0.3 + Math.random() * 0.4;
      }
    }
  }

  return row;
}

// scroll control
let scrollAccumulator = 0;
let time = 0;

function putRow(row, y) {
  if (!rowImageData || rowImageData.width !== width) {
    rowImageData = ctx.createImageData(width, 1);
  }
  let img = rowImageData;
  for (let x = 0; x < width; x++) {
    let [r,g,b] = getColor(row[x]);
    let i = x * 4;
    img.data[i] = r;
    img.data[i+1] = g;
    img.data[i+2] = b;
    img.data[i+3] = 255;
  }
  ctx.putImageData(img, 0, y);
}

function prefillCanvas() {
  for (let y = height - 1; y >= 0; y--) {
    time += ROW_TIME_STEP;
    putRow(generateRow(time), y);
  }
}

function draw(now) {
  rafId = null;
  const elapsed = Math.min(48, Math.max(8, now - (lastFrameTime || now)));
  lastFrameTime = now;
  scrollAccumulator += SCROLL_SPEED * (elapsed / 16.6667);

  const steps = Math.min(3, Math.floor(scrollAccumulator));
  if (steps > 0) {
    scrollAccumulator -= steps;
    for (let s = 0; s < steps; s++) {
      time += ROW_TIME_STEP;
      scrollCtx.clearRect(0, 0, width, height);
      scrollCtx.drawImage(canvas, 0, 0, width, height);
      ctx.drawImage(scrollBuffer, 0, 0, width, height, 0, 1, width, height);
      putRow(generateRow(time), 0);
    }
  }

  rafId = requestAnimationFrame(draw);
}

resize();
lastFrameTime = performance.now();
window.addEventListener("resize", () => {
  if (rafId !== null) cancelAnimationFrame(rafId);
  resize();
  lastFrameTime = performance.now();
  rafId = requestAnimationFrame(draw);
});

rafId = requestAnimationFrame(draw);
</script>

</body>
</html>
