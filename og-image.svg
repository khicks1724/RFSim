<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Deep space background -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0614"/>
      <stop offset="100%" stop-color="#06030f"/>
    </linearGradient>

    <!-- Glow filter for signal lines -->
    <filter id="glow-strong" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="3" result="blur2"/>
      <feMerge><feMergeNode in="blur1"/><feMergeNode in="blur2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-20%" y="-60%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Signal column gradients: hot yellow-orange core, purple halo -->
    <linearGradient id="sig1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="15%"  stop-color="#f97316" stop-opacity="0.85"/>
      <stop offset="30%"  stop-color="#fde68a" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#fbbf24" stop-opacity="0.75"/>
      <stop offset="85%"  stop-color="#c2410c" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="sig2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7c3aed" stop-opacity="0.1"/>
      <stop offset="20%"  stop-color="#fde68a" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#f97316" stop-opacity="0.95"/>
      <stop offset="65%"  stop-color="#fbbf24" stop-opacity="0.8"/>
      <stop offset="80%"  stop-color="#f97316" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="sig3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fde68a" stop-opacity="0.9"/>
      <stop offset="25%"  stop-color="#f97316" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#fbbf24" stop-opacity="0.85"/>
      <stop offset="75%"  stop-color="#f97316" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c2410c" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="sig4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="30%"  stop-color="#fde68a" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="75%"  stop-color="#fbbf24" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Purple halo gradient for side glow -->
    <radialGradient id="halo1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4c1d95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#9333ea" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b0764" stop-opacity="0"/>
    </radialGradient>

    <!-- Noise texture overlay -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feMerge><feMergeNode in="SourceGraphic"/><feMergeNode/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle horizontal scan lines -->
  <rect width="1200" height="630" fill="none" stroke="#1a0a3a" stroke-width="1" opacity="0.15"
        style="background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(26,10,58,0.1) 3px, rgba(26,10,58,0.1) 4px)"/>

  <!-- === SIGNAL COLUMNS === -->

  <!-- Col 1: far left, strong -->
  <rect x="0" y="0" width="40" height="630" fill="url(#halo1)" filter="url(#glow-strong)"/>
  <rect x="14" y="0" width="12" height="630" fill="url(#sig1)" filter="url(#glow-strong)"/>
  <rect x="18" y="0" width="4" height="630" fill="#fde68a" opacity="0.95"/>

  <!-- Col 2: ~22% -->
  <rect x="235" y="0" width="30" height="630" fill="url(#halo2)" filter="url(#glow-soft)"/>
  <rect x="244" y="0" width="8" height="630" fill="url(#sig2)" filter="url(#glow-soft)"/>
  <rect x="247" y="0" width="2" height="630" fill="#fbbf24" opacity="0.7"/>

  <!-- Col 3: center-left ~40% — widest/brightest -->
  <rect x="440" y="0" width="60" height="630" fill="url(#halo1)" filter="url(#glow-strong)"/>
  <rect x="458" y="0" width="16" height="630" fill="url(#sig3)" filter="url(#glow-strong)"/>
  <rect x="463" y="0" width="6" height="630" fill="#fde68a" opacity="1"/>
  <rect x="465" y="0" width="2" height="630" fill="#fff8dc" opacity="0.9"/>

  <!-- Col 4: center-right ~62% -->
  <rect x="690" y="0" width="22" height="630" fill="url(#halo2)" filter="url(#glow-soft)"/>
  <rect x="697" y="0" width="8" height="630" fill="url(#sig2)" filter="url(#glow-soft)"/>
  <rect x="700" y="0" width="2" height="630" fill="#fbbf24" opacity="0.75"/>

  <!-- Col 5: right ~80% -->
  <rect x="870" y="0" width="50" height="630" fill="url(#halo1)" filter="url(#glow-strong)"/>
  <rect x="884" y="0" width="14" height="630" fill="url(#sig4)" filter="url(#glow-strong)"/>
  <rect x="889" y="0" width="4" height="630" fill="#fde68a" opacity="0.95"/>

  <!-- Col 6: far right edge -->
  <rect x="1160" y="0" width="40" height="630" fill="url(#halo2)" filter="url(#glow-soft)"/>
  <rect x="1170" y="0" width="10" height="630" fill="url(#sig1)" filter="url(#glow-soft)"/>
  <rect x="1173" y="0" width="3" height="630" fill="#f97316" opacity="0.8"/>

  <!-- Faint horizontal noise streaks (like the scan lines in the reference) -->
  <line x1="160" y1="165" x2="280" y2="165" stroke="#f97316" stroke-width="1" opacity="0.25"/>
  <line x1="430" y1="282" x2="590" y2="282" stroke="#fbbf24" stroke-width="1" opacity="0.2"/>
  <line x1="30"  y1="462" x2="120" y2="462" stroke="#f97316" stroke-width="1" opacity="0.3"/>
  <line x1="490" y1="528" x2="570" y2="528" stroke="#f97316" stroke-width="1" opacity="0.2"/>
  <line x1="605" y1="762" x2="730" y2="762" stroke="#fbbf24" stroke-width="1" opacity="0.18"/>
  <line x1="155" y1="612" x2="310" y2="612" stroke="#f97316" stroke-width="1" opacity="0.2"/>
  <line x1="618" y1="755" x2="740" y2="755" stroke="#fbbf24" stroke-width="1" opacity="0.15"/>

  <!-- Dark vignette overlay to frame the card area -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
    <stop offset="40%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#vignette)"/>

  <!-- Center glow behind text -->
  <radialGradient id="center-glow" cx="50%" cy="50%" r="35%">
    <stop offset="0%"  stop-color="#1e0a40" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#center-glow)"/>

  <!-- RF SIM text — Orbitron 800 extrabold -->
  <!-- Shadow/glow layer -->
  <text x="600" y="345" text-anchor="middle" dominant-baseline="middle"
        font-family="Orbitron, 'Arial Black', sans-serif" font-weight="800"
        font-size="120" letter-spacing="18" fill="#7dd3fc" opacity="0.25"
        filter="url(#text-glow)">RF SIM</text>
  <!-- Main text -->
  <text x="600" y="345" text-anchor="middle" dominant-baseline="middle"
        font-family="Orbitron, 'Arial Black', sans-serif" font-weight="800"
        font-size="120" letter-spacing="18" fill="#e0f2fe"
        filter="url(#text-glow)">RF SIM</text>
  <!-- Crisp top layer -->
  <text x="600" y="345" text-anchor="middle" dominant-baseline="middle"
        font-family="Orbitron, 'Arial Black', sans-serif" font-weight="800"
        font-size="120" letter-spacing="18" fill="#f0f9ff">RF SIM</text>
</svg>
